function SelectorProductosModal({miseItems, neveraNombre, titulo, onConfirm, onClose}) {
  const [buscar, setBuscar] = useState('');
  const [seleccion, setSeleccion] = useState({});
  const [error, setError] = useState('');

  const filtrados = (miseItems||[]).filter(m=>
    normalizar(m.producto).includes(normalizar(buscar))
  );

  function toggleProducto(producto) {
    setSeleccion(s=>{
      if (s[producto]) { const n={...s}; delete n[producto]; return n; }
      return {...s, [producto]: {cantidad:'', producto}};
    });
    setError('');
  }

  function setCantidad(producto, val) {
    setSeleccion(s=>({...s, [producto]: {...s[producto], cantidad: val}}));
  }

  function confirmar() {
    setError('');
    const items = Object.values(seleccion);
    if (!items.length) return setError('Seleccione al menos un producto.');
    for (const it of items) {
      const c = parseFloat(String(it.cantidad).replace(',','.'));
      if (isNaN(c)||c<=0) return setError(`Cantidad inválida en "${it.producto}".`);
    }
    onConfirm(items.map(it=>({producto:it.producto, cantidad:parseFloat(String(it.cantidad).replace(',','.'))})));
  }

  const totalSel = Object.keys(seleccion).length;

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal modal-lg" style={{maxHeight:'92dvh'}} onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <h3><i className="fas fa-table-list" style={{color:'var(--verde)',marginRight:7}}/>Seleccionar de {titulo||'Mise an Place'} — {neveraNombre}</h3>
          <button className="btn btn-gris btn-icon btn-sm" onClick={onClose}><i className="fas fa-times"/></button>
        </div>
        <div className="modal-body" style={{padding:'12px 16px'}}>
          {error && <div className="alert alert-error" style={{marginBottom:8}}><i className="fas fa-exclamation-circle"/>{error}</div>}
          <div className="search-wrap" style={{marginBottom:10}}>
            <i className="fas fa-search search-icon"/>
            <input className="form-control" value={buscar} onChange={e=>setBuscar(e.target.value)}
              placeholder="Buscar producto..." autoFocus/>
          </div>
          <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))', gap:6, maxHeight:'52dvh', overflowY:'auto', paddingRight:2}}>
            {filtrados.map(m=>{
              const sel = !!seleccion[m.producto];
              return (
                <div key={m.id}
                  onClick={()=>toggleProducto(m.producto)}
                  style={{
                    border: sel ? '2px solid var(--verde)' : '1.5px solid var(--borde)',
                    borderRadius:8, padding:'8px 10px', cursor:'pointer',
                    background: sel ? '#f0fdf4' : '#fff',
                    transition:'all .12s', userSelect:'none',
                  }}>
                  <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: sel?6:0}}>
                    <span style={{fontWeight:600, fontSize:12, color: sel?'var(--verde)':'#374151', lineHeight:1.3}}>{m.producto}</span>
                    <span style={{fontSize:11, color:'var(--gris)', marginLeft:6, flexShrink:0}}>
                      {sel
                        ? <i className="fas fa-check-circle" style={{color:'var(--verde)'}}/>
                        : <i className="fas fa-circle" style={{color:'#d1d5db'}}/>}
                    </span>
                  </div>
                  <div style={{fontSize:11, color:'var(--gris)'}}>Exist: <strong>{m.existencia}</strong></div>
                  {sel && (
                    <input
                      className="form-control"
                      type="number" min="0.01" step="0.01"
                      placeholder="Cantidad"
                      value={seleccion[m.producto].cantidad}
                      onClick={e=>e.stopPropagation()}
                      onChange={e=>setCantidad(m.producto, e.target.value)}
                      style={{marginTop:6, fontSize:12, padding:'5px 8px'}}
                      autoFocus
                    />
                  )}
                </div>
              );
            })}
            {filtrados.length===0 && (
              <div style={{gridColumn:'1/-1', textAlign:'center', padding:24, color:'var(--gris)', fontSize:13}}>
                Sin resultados para "{buscar}"
              </div>
            )}
          </div>
        </div>
        <div className="modal-footer" style={{justifyContent:'space-between'}}>
          <span style={{fontSize:12, color:'var(--gris)', alignSelf:'center'}}>
            {totalSel>0 ? <><i className="fas fa-check-circle" style={{color:'var(--verde)',marginRight:4}}/>{totalSel} producto{totalSel>1?'s':''} seleccionado{totalSel>1?'s':''}</> : 'Toca un producto para seleccionarlo'}
          </span>
          <div style={{display:'flex', gap:8}}>
            <button className="btn btn-gris" onClick={onClose}>Cancelar</button>
            <button className="btn btn-verde" onClick={confirmar} disabled={!totalSel}>
              <i className="fas fa-arrow-right-to-bracket"/>Agregar {totalSel>0?totalSel:''} a {neveraNombre}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function TransferirModal({fromIdx, item, neveras, onTransfer, onClose}) {
  const [toIdx, setToIdx] = useState('');
  const [cantidad, setCantidad] = useState(String(item.existencia));
  const [error, setError] = useState('');

  function confirmar() {
    setError('');
    if (toIdx==='') return setError('Seleccione la nevera de destino.');
    const c = parseFloat(String(cantidad).replace(',','.'));
    if (isNaN(c)||c<=0) return setError('Cantidad inválida.');
    if (c>item.existencia) return setError(`Excede la existencia disponible (${item.existencia}).`);
    onTransfer(fromIdx, item, parseInt(toIdx), c);
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <h3><i className="fas fa-right-left" style={{color:'var(--azul)',marginRight:7}}/>Transferir Producto</h3>
          <button className="btn btn-gris btn-icon btn-sm" onClick={onClose}><i className="fas fa-times"/></button>
        </div>
        <div className="modal-body">
          {error && <div className="alert alert-error"><i className="fas fa-exclamation-circle"/>{error}</div>}
          <div className="form-group">
            <label className="form-label">Producto</label>
            <input className="form-control" value={item.producto} readOnly style={{background:'#f9fafb',color:'#374151'}}/>
          </div>
          <div className="grid-2">
            <div className="form-group">
              <label className="form-label">Desde</label>
              <input className="form-control" value={neveras[fromIdx].nombre} readOnly style={{background:'#f9fafb',color:'#374151'}}/>
            </div>
            <div className="form-group">
              <label className="form-label">Hacia</label>
              <select className="form-control" value={toIdx} onChange={e=>setToIdx(e.target.value)}>
                <option value="">Seleccione nevera...</option>
                {neveras.map((n,i)=>i!==fromIdx&&<option key={i} value={i}>{n.nombre}</option>)}
              </select>
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">
              Cantidad a transferir
              <span style={{fontWeight:400,color:'var(--gris)',marginLeft:6}}>disponible: <strong>{item.existencia}</strong></span>
            </label>
            <input className="form-control" type="number" min="0.01" step="0.01" max={item.existencia}
              value={cantidad} onChange={e=>setCantidad(e.target.value)}/>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-gris" onClick={onClose}>Cancelar</button>
          <button className="btn btn-azul" onClick={confirmar}><i className="fas fa-right-left"/>Transferir</button>
        </div>
      </div>
    </div>
  );
}

function ListadoCompra({inventario, correos, setCorreos}) {
  const toast = useToast();
  const [tipoStock,  setTipoStock]  = useState('lunes_jueves');
  const [listado,    setListado]    = useState(null);
  const [modalEnvio, setModalEnvio] = useState(false);
  const [modalGas,   setModalGas]   = useState(false);
  const [googleConfig, setGoogleConfig] = useState(()=>load(KEYS.googleConfig, GOOGLE_DEFAULT_CONFIG));
  const [googleConfigEdit, setGoogleConfigEdit] = useState(()=>load(KEYS.googleConfig, GOOGLE_DEFAULT_CONFIG));
  const [googleReady, setGoogleReady] = useState(false);
  const [googleAuthed, setGoogleAuthed] = useState(false);
  const [authorizing, setAuthorizing] = useState(false);
  const [subiendo,   setSubiendo]   = useState(false);
  const filtrosVacios = {producto:'',suplidor:'',medida:'',stockReq:'',existencia:'',comprar:''};
  const [filtros, setFiltros] = useState(filtrosVacios);
  const accessTokenRef = useRef('');
  const accessTokenExpiryRef = useRef(0);

  function setFiltro(k, v) { setFiltros(p=>({...p,[k]:v})); }

  useEffect(()=>save(KEYS.googleConfig, googleConfig),[googleConfig]);

  useEffect(()=>{
    function checkGoogleReady() {
      const ready = Boolean(window.google && window.google.accounts && window.google.accounts.oauth2);
      setGoogleReady(ready);
      return ready;
    }
    if (checkGoogleReady()) return;
    const timer = window.setInterval(function () {
      if (checkGoogleReady()) window.clearInterval(timer);
    }, 400);
    return ()=>window.clearInterval(timer);
  },[]);

  function resetGoogleSession() {
    accessTokenRef.current = '';
    accessTokenExpiryRef.current = 0;
    setGoogleAuthed(false);
  }

  function abrirConfigGas() {
    setGoogleConfigEdit(googleConfig);
    setModalGas(true);
  }

  function guardarGasUrl() {
    const next = {
      clientId: (googleConfigEdit.clientId || '').trim(),
      folderId: (googleConfigEdit.folderId || '').trim(),
    };
    setGoogleConfig(next);
    if (!next.clientId) resetGoogleSession();
    setModalGas(false);
    toast(next.clientId ? 'Configuracion de Google guardada.' : 'Configuracion eliminada.');
  }

  async function solicitarPermisosGoogle(forcePrompt, configOverride) {
    const currentConfig = configOverride || googleConfig;
    if (window.location.protocol === 'file:') {
      throw new Error('Google OAuth no funciona desde file://. Abra este sistema en http://localhost o HTTPS.');
    }
    if (!currentConfig.clientId) {
      throw new Error('Primero configure el Client ID de Google.');
    }
    if (!googleReady || !window.google || !window.google.accounts || !window.google.accounts.oauth2) {
      throw new Error('La libreria de Google aun no termina de cargar.');
    }

    const prompt = forcePrompt || !accessTokenRef.current ? 'consent' : '';
    setAuthorizing(true);
    try {
      const token = await new Promise(function (resolve, reject) {
        const client = window.google.accounts.oauth2.initTokenClient({
          client_id: currentConfig.clientId,
          scope: GOOGLE_SCOPES,
          callback: function (response) {
            if (!response || response.error) {
              reject(new Error(response && response.error ? response.error : 'No se pudo obtener el token de Google.'));
              return;
            }
            accessTokenRef.current = response.access_token;
            accessTokenExpiryRef.current = Date.now() + Math.max((response.expires_in || 3600) - 60, 60) * 1000;
            setGoogleAuthed(true);
            resolve(response.access_token);
          },
          error_callback: function (error) {
            reject(new Error(error && error.type ? error.type : 'La autorizacion de Google fue cancelada.'));
          },
        });
        client.requestAccessToken({ prompt });
      });
      return token;
    } finally {
      setAuthorizing(false);
    }
  }

  async function ensureGoogleToken(forcePrompt) {
    if (!forcePrompt && accessTokenRef.current && Date.now() < accessTokenExpiryRef.current) {
      return accessTokenRef.current;
    }
    return solicitarPermisosGoogle(Boolean(forcePrompt));
  }

  async function crearHojaListadoGoogle(payload) {
    const token = await ensureGoogleToken(false);
    const created = await googleFetchJson('https://sheets.googleapis.com/v4/spreadsheets', token, {
      method: 'POST',
      body: {
        properties: { title: payload.filename.replace('.xlsx', '') },
        sheets: [{ properties: { title: 'Listado', gridProperties: { frozenRowCount: 4 } } }],
      },
    });

    const spreadsheetId = created.spreadsheetId;
    const firstSheetId = created.sheets && created.sheets[0] && created.sheets[0].properties
      ? created.sheets[0].properties.sheetId
      : 0;

    await googleFetchJson(
      `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Listado!A1?valueInputOption=USER_ENTERED`,
      token,
      { method: 'PUT', body: { range: 'Listado!A1', majorDimension: 'ROWS', values: payload.rows } }
    );

    await googleFetchJson(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}:batchUpdate`, token, {
      method: 'POST',
      body: {
        requests: [
          {
            repeatCell: {
              range: { sheetId: firstSheetId, startRowIndex: 3, endRowIndex: 4 },
              cell: {
                userEnteredFormat: {
                  backgroundColor: { red: 0.12, green: 0.48, blue: 0.23 },
                  textFormat: { foregroundColor: { red: 1, green: 1, blue: 1 }, bold: true },
                  horizontalAlignment: 'CENTER',
                },
              },
              fields: 'userEnteredFormat(backgroundColor,textFormat,horizontalAlignment)',
            },
          },
          {
            updateDimensionProperties: {
              range: { sheetId: firstSheetId, dimension: 'COLUMNS', startIndex: 0, endIndex: 6 },
              properties: { pixelSize: 180 },
              fields: 'pixelSize',
            },
          },
        ],
      },
    });

    if (googleConfig.folderId) {
      const fileMeta = await googleFetchJson(
        `https://www.googleapis.com/drive/v3/files/${spreadsheetId}?fields=parents`,
        token
      );
      const currentParents = fileMeta.parents && fileMeta.parents.length ? fileMeta.parents.join(',') : '';
      const moveUrl = currentParents
        ? `https://www.googleapis.com/drive/v3/files/${spreadsheetId}?addParents=${encodeURIComponent(googleConfig.folderId)}&removeParents=${encodeURIComponent(currentParents)}&fields=id,webViewLink`
        : `https://www.googleapis.com/drive/v3/files/${spreadsheetId}?addParents=${encodeURIComponent(googleConfig.folderId)}&fields=id,webViewLink`;
      await googleFetchJson(moveUrl, token, { method: 'PATCH', body: {} });
    }

    return created;
  }

  async function enviarListadoPorGmail(destinatarios) {
    const token = await ensureGoogleToken(false);
    const fechaStr = new Date(listado.fecha).toLocaleDateString('es-DO',{day:'2-digit',month:'short',year:'numeric'});
    const items = listado.items.map(function (p) {
      return {
        nombre: p.nombre,
        suplidor: p.suplidor || '-',
        medida: p.medida,
        stock: p.stock,
        existencia: Number(p.existencia.toFixed(2)),
        comprar: Number(p.comprar.toFixed(2)),
      };
    });
    const subject = `LISTADO DE COMPRA - ${titulo} - ${fechaStr}`;
    const html = buildListadoEmailHtml({ items, titulo, fecha: fechaStr });
    const mime = [
      `To: ${destinatarios.join(', ')}`,
      'Content-Type: text/html; charset=UTF-8',
      'MIME-Version: 1.0',
      `Subject: ${subject}`,
      '',
      html,
    ].join('\r\n');

    await googleFetchJson('https://gmail.googleapis.com/gmail/v1/users/me/messages/send', token, {
      method: 'POST',
      body: { raw: encodeBase64Url(mime) },
    });
  }

  function generar() {
    const compras = inventario.filter(r=>r.tipo==='producto').reduce((acc,p)=>{
      const stock = tipoStock==='lunes_jueves' ? (p.stockLunesJueves||0) : (p.stockViernesDomingo||0);
      const exist = (p.entrada||0)-(p.salida||0)-(p.decomiso||0);
      if (stock>0 && exist<stock) acc.push({...p,existencia:exist,stock,comprar:stock-exist});
      return acc;
    },[]);
    setListado({items:compras,tipo:tipoStock,fecha:new Date()});
    setFiltros(filtrosVacios);
    toast(`Listado generado: ${compras.length} productos`);
  }

  async function exportar() {
    if (!listado || listado.items.length===0) { toast('No hay productos en el listado.','error'); return; }
    if (typeof XLSX === 'undefined') { toast('Libreria de Excel no disponible.','error'); return; }

    const fechaStr = new Date(listado.fecha).toLocaleDateString('es-DO',{day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\//g,'-');
    const tituloLimpio = titulo.replace(/[— ]+/g,'_');
    const nombreArchivo = `Listado_Compra_${tituloLimpio}_${fechaStr}.xlsx`;
    const filas = buildListadoRows(listado, titulo);

    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(filas);
    ws['!cols'] = [{wch:32},{wch:24},{wch:10},{wch:12},{wch:12},{wch:14}];
    XLSX.utils.book_append_sheet(wb, ws, 'Listado de Compra');
    XLSX.writeFile(wb, nombreArchivo);

    if (googleConfig.clientId) {
      setSubiendo(true);
      try {
        await crearHojaListadoGoogle({
          filename: nombreArchivo,
          titulo,
          fecha: new Date(listado.fecha).toLocaleString('es-DO'),
          rows: filas,
        });
        toast(`Google Sheets creado: ${nombreArchivo}`,'ok');
      } catch(err) {
        resetGoogleSession();
        toast(err && err.message ? err.message : 'Error al crear la hoja en Google.','error');
      } finally {
        setSubiendo(false);
      }
    } else {
      toast(`Descargado: ${nombreArchivo} - Configura Google para crear la hoja online.`);
    }
  }

  const titulo = tipoStock==='lunes_jueves' ? 'LUNES — JUEVES' : 'VIERNES — DOMINGO';

  const itemsFiltrados = listado ? listado.items.filter(p=>{
    const f = filtros;
    return (
      (!f.producto   || p.nombre.toLowerCase().includes(f.producto.toLowerCase())) &&
      (!f.suplidor   || (p.suplidor||'').toLowerCase().includes(f.suplidor.toLowerCase())) &&
      (!f.medida     || (p.medida||'').toLowerCase().includes(f.medida.toLowerCase())) &&
      (!f.stockReq   || String(p.stock).includes(f.stockReq)) &&
      (!f.existencia || String(Number(p.existencia.toFixed(2))).includes(f.existencia)) &&
      (!f.comprar    || String(Number(p.comprar.toFixed(2))).includes(f.comprar))
    );
  }) : [];

  const hayFiltros = Object.values(filtros).some(v=>v!=='');

  const thFiltro = {padding:'4px 6px', background:'#e8f5e9'};
  const inputFiltro = {width:'100%',padding:'3px 7px',border:'1px solid #a7d7b5',borderRadius:4,fontSize:11,outline:'none',background:'#fff'};

  return (
    <div>
      <div className="card" style={{marginBottom:14}}>
        <div className="card-header"><h2><i className="fas fa-sliders" style={{marginRight:7}}/>Configuración</h2></div>
        <div className="card-body">
          <div className="form-group" style={{maxWidth:340}}>
            <label className="form-label">Período de stock</label>
            <select className="form-control" value={tipoStock} onChange={e=>setTipoStock(e.target.value)}>
              <option value="lunes_jueves">1 — Lunes, Martes, Miércoles, Jueves</option>
              <option value="viernes_domingo">2 — Viernes, Sábado, Domingo</option>
            </select>
          </div>
          <div className="action-bar" style={{marginBottom:0,flexWrap:'wrap',gap:8}}>
            <button className="btn btn-verde" onClick={generar}><i className="fas fa-cart-shopping"/>Generar listado</button>
            {listado && (
              <button className="btn btn-azul" onClick={exportar} disabled={subiendo} style={{opacity:subiendo?0.7:1}}>
                {subiendo
                  ? <><i className="fas fa-spinner fa-spin"/>Subiendo...</>
                  : <><i className="fas fa-file-excel"/>{googleConfig.clientId ? 'Exportar a Google' : 'Exportar'}</>
                }
              </button>
            )}
            {listado && <button className="btn btn-naranja" onClick={()=>setModalEnvio(true)}><i className="fas fa-envelope"/>Enviar correo</button>}
            {listado && <button className="btn btn-gris" onClick={()=>{setListado(null);setFiltros(filtrosVacios);}}><i className="fas fa-trash"/>Limpiar</button>}
            <button
              className="btn btn-gris"
              onClick={abrirConfigGas}
              title={googleConfig.clientId ? 'Google configurado' : 'Configurar Google Workspace'}
              style={{marginLeft:'auto',padding:'0 10px'}}
            >
              <i className="fas fa-cloud-upload-alt" style={{color: googleConfig.clientId ? '#16a34a' : '#6b7280'}}/>
              <span style={{fontSize:11,marginLeft:5}}>{googleConfig.clientId ? 'Google OK' : 'Config. Google'}</span>
            </button>
          </div>
        </div>
      </div>

      {listado && (
        <div className="card">
          <div className="card-header">
            <h2><i className="fas fa-cart-shopping" style={{marginRight:7,color:'var(--verde)'}}/>LISTADO — {titulo}</h2>
            <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
              <span style={{fontSize:11,color:'var(--gris)'}}>
                {new Date(listado.fecha).toLocaleString('es-DO',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}
              </span>
              <span className={`pill ${listado.items.length>0?'pill-rojo':'pill-verde'}`}>{listado.items.length} productos</span>
              {hayFiltros && <span className="pill pill-azul">{itemsFiltrados.length} visibles</span>}
            </div>
          </div>
          {listado.items.length===0 ? (
            <div className="card-body" style={{textAlign:'center',color:'var(--verde)',paddingTop:30,paddingBottom:30}}>
              <i className="fas fa-check-circle" style={{fontSize:34,display:'block',marginBottom:8}}/>
              Inventario completo, nada por comprar.
            </div>
          ) : (
            <div className="table-wrap">
              <table>
                <thead>
                  <tr style={{background:'#1f7a3a'}}>
                    {['Producto','Suplidor','Medida','Stock Req.','Existencia','A COMPRAR'].map(h=>(
                      <th key={h} style={{color:'#fff',background:'#1f7a3a'}}>{h}</th>
                    ))}
                  </tr>
                  <tr>
                    <th style={thFiltro}><input style={inputFiltro} placeholder="Buscar producto" value={filtros.producto} onChange={e=>setFiltro('producto',e.target.value)}/></th>
                    <th style={thFiltro}><input style={inputFiltro} placeholder="Buscar suplidor" value={filtros.suplidor} onChange={e=>setFiltro('suplidor',e.target.value)}/></th>
                    <th style={thFiltro}><input style={inputFiltro} placeholder="Buscar medida"   value={filtros.medida}   onChange={e=>setFiltro('medida',e.target.value)}/></th>
                    <th style={thFiltro}><input style={inputFiltro} placeholder="Buscar stock"    value={filtros.stockReq} onChange={e=>setFiltro('stockReq',e.target.value)}/></th>
                    <th style={thFiltro}><input style={inputFiltro} placeholder="Buscar exist."   value={filtros.existencia} onChange={e=>setFiltro('existencia',e.target.value)}/></th>
                    <th style={{...thFiltro,display:'flex',alignItems:'center',gap:4}}>
                      <input style={{...inputFiltro,flex:1}} placeholder="Buscar compra" value={filtros.comprar} onChange={e=>setFiltro('comprar',e.target.value)}/>
                      {hayFiltros && <button onClick={()=>setFiltros(filtrosVacios)} style={{border:'none',background:'#c0392b',color:'#fff',borderRadius:3,padding:'2px 5px',cursor:'pointer',fontSize:10,flexShrink:0}} title="Limpiar filtros">x</button>}
                    </th>
                  </tr>
                </thead>
                <tbody>
                  {itemsFiltrados.length===0 ? (
                    <tr><td colSpan={6} style={{textAlign:'center',padding:'20px',color:'var(--gris)'}}>Sin resultados para los filtros aplicados.</td></tr>
                  ) : itemsFiltrados.map((p,i)=>(
                    <tr key={i}>
                      <td style={{fontWeight:500}}>{p.nombre}</td>
                      <td style={{color:'var(--gris)',fontSize:12}}>{p.suplidor||'—'}</td>
                      <td><span className="pill pill-gris">{p.medida}</span></td>
                      <td>{p.stock}</td>
                      <td><span className={p.existencia<=0?'exist-zero':'exist-low'}>{Number(p.existencia.toFixed(2))}</span></td>
                      <td style={{fontWeight:700,color:'var(--azul)',fontSize:14}}>{Number(p.comprar.toFixed(2))} {p.medida}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}

      {modalEnvio && listado && (
        <ModalEnvioCorreo
          listado={listado}
          titulo={titulo}
          correos={correos}
          setCorreos={setCorreos}
          googleConfigured={Boolean(googleConfig.clientId)}
          googleAuthed={googleAuthed}
          authorizing={authorizing}
          enviarListadoPorGmail={enviarListadoPorGmail}
          solicitarPermisosGoogle={solicitarPermisosGoogle}
          onClose={()=>setModalEnvio(false)}
          onSent={()=>{ setModalEnvio(false); setListado(null); }}
          toast={toast}
        />
      )}

      {modalGas && (
        <div className="modal-overlay" onClick={()=>setModalGas(false)}>
          <div className="modal modal-lg" onClick={e=>e.stopPropagation()} style={{maxWidth:640}}>
            <div className="modal-header">
              <h3><i className="fas fa-cloud-upload-alt" style={{marginRight:7,color:'#1f7a3a'}}/>Configurar Google Workspace</h3>
              <button className="btn btn-gris btn-icon btn-sm" onClick={()=>setModalGas(false)}><i className="fas fa-times"/></button>
            </div>
            <div className="modal-body" style={{display:'flex',flexDirection:'column',gap:16}}>
              <div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:8,padding:14}}>
                <div style={{fontWeight:600,marginBottom:8,color:'#15803d'}}>
                  <i className="fas fa-info-circle" style={{marginRight:6}}/>Instrucciones - solo se hace una vez
                </div>
                <ol style={{paddingLeft:18,fontSize:13,lineHeight:'1.9',color:'#374151'}}>
                  <li>Abre <a href="https://console.cloud.google.com/" target="_blank" rel="noreferrer" style={{color:'#1d4ed8'}}>Google Cloud Console</a> y usa o crea un proyecto.</li>
                  <li>Activa Google Drive API, Google Sheets API y Gmail API.</li>
                  <li>Configura la pantalla de consentimiento OAuth.</li>
                  <li>Crea un OAuth Client ID tipo Web application.</li>
                  <li>En Authorized JavaScript origins agrega este origen: <strong>{window.location.origin}</strong></li>
                  <li>Pega aqui el Client ID y, si quieres, el Folder ID de Drive.</li>
                </ol>
              </div>

              {window.location.protocol === 'file:' && (
                <div style={{background:'#fff7ed',border:'1px solid #fdba74',borderRadius:8,padding:12,color:'#9a3412',fontSize:12}}>
                  <i className="fas fa-triangle-exclamation" style={{marginRight:6}}/>
                  Esta app esta abierta como archivo local. Para autorizar Google debes ejecutarla desde <strong>http://localhost</strong> o un dominio <strong>HTTPS</strong>.
                </div>
              )}

              <div className="form-group" style={{marginBottom:0}}>
                <label className="form-label">OAuth Client ID</label>
                <input
                  className="form-control"
                  type="text"
                  placeholder="1234567890-abc123xyz.apps.googleusercontent.com"
                  value={googleConfigEdit.clientId || ''}
                  onChange={e=>setGoogleConfigEdit(p=>({...p, clientId:e.target.value}))}
                />
              </div>

              <div className="form-group" style={{marginBottom:0}}>
                <label className="form-label">Folder ID de Drive (opcional)</label>
                <input
                  className="form-control"
                  type="text"
                  placeholder="1AbCdEfGhIjKlMnOpQrStUvWxYz"
                  value={googleConfigEdit.folderId || ''}
                  onChange={e=>setGoogleConfigEdit(p=>({...p, folderId:e.target.value}))}
                />
                <div style={{fontSize:11,color:'#6b7280',marginTop:4}}>
                  Si se completa, las hojas nuevas se moveran automaticamente a esa carpeta.
                </div>
              </div>

              <div style={{background:'#f8fafc',border:'1px solid #e5e7eb',borderRadius:8,padding:12,fontSize:12,color:'#334155'}}>
                <div style={{fontWeight:600,marginBottom:6}}>Estado de la conexion</div>
                <div><strong>Libreria Google:</strong> {googleReady ? 'lista' : 'cargando'}</div>
                <div><strong>Configuracion:</strong> {googleConfig.clientId ? 'guardada' : 'pendiente'}</div>
                <div><strong>Permisos:</strong> {googleAuthed ? 'autorizados en esta sesion' : 'pendientes'}</div>
              </div>
            </div>
            <div className="modal-footer">
              {googleConfig.clientId && (
                <button className="btn btn-gris" onClick={()=>{
                  setGoogleConfigEdit(GOOGLE_DEFAULT_CONFIG);
                  setGoogleConfig(GOOGLE_DEFAULT_CONFIG);
                  resetGoogleSession();
                }}>
                  <i className="fas fa-trash"/>Eliminar
                </button>
              )}
              <button className="btn btn-gris" onClick={()=>setModalGas(false)}>Cancelar</button>
              <button
                className="btn btn-azul"
                onClick={async ()=>{
                  try {
                    const draft = {
                      clientId: (googleConfigEdit.clientId || '').trim(),
                      folderId: (googleConfigEdit.folderId || '').trim(),
                    };
                    setGoogleConfig(draft);
                    setGoogleConfigEdit(draft);
                    await solicitarPermisosGoogle(true, draft);
                    toast('Permisos de Google concedidos para esta sesion.','ok');
                  } catch (err) {
                    toast(err && err.message ? err.message : 'No se pudo autorizar Google.','error');
                  }
                }}
                disabled={!googleConfigEdit.clientId || authorizing}
                style={{opacity:(!googleConfigEdit.clientId || authorizing)?0.7:1}}
              >
                {authorizing
                  ? <><i className="fas fa-spinner fa-spin"/>Autorizando...</>
                  : <><i className="fas fa-key"/>Solicitar permisos</>}
              </button>
              <button className="btn btn-verde" onClick={guardarGasUrl}><i className="fas fa-save"/>Guardar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ModalEnvioCorreo({listado, titulo, correos, setCorreos, googleConfigured, googleAuthed, authorizing, enviarListadoPorGmail, solicitarPermisosGoogle, onClose, onSent, toast}) {
  const [destinatarios, setDestinatarios] = useState([...correos]);
  const [nuevoCorreo, setNuevoCorreo]     = useState('');
  const [errorCorreo, setErrorCorreo]     = useState('');
  const [enviando,    setEnviando]        = useState(false);

  const emailValido = v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim());

  function agregarCorreo() {
    const val = nuevoCorreo.trim().toLowerCase();
    if (!emailValido(val)) { setErrorCorreo('Correo electronico no valido.'); return; }
    if (destinatarios.includes(val)) { setErrorCorreo('Este correo ya esta en la lista.'); return; }
    setDestinatarios(p=>[...p, val]);
    setNuevoCorreo('');
    setErrorCorreo('');
  }

  function quitarCorreo(idx) { setDestinatarios(p=>p.filter((_,i)=>i!==idx)); }
  function handleKeyDown(e)  { if (e.key==='Enter') { e.preventDefault(); agregarCorreo(); } }

  async function enviar() {
    if (destinatarios.length===0) { toast('Agregue al menos un destinatario.','error'); return; }
    if (!googleConfigured) {
      toast('Configure Google primero con el boton Config. Google.','error');
      return;
    }

    setEnviando(true);
    try {
      await enviarListadoPorGmail(destinatarios);
      setCorreos(destinatarios);
      toast(`Correo enviado a ${destinatarios.length} destinatario(s) por Gmail.`,'ok');
      onSent();
    } catch(err) {
      toast(err && err.message ? err.message : 'Error al enviar por Gmail.','error');
    } finally {
      setEnviando(false);
    }
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal modal-lg" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <h3><i className="fas fa-envelope" style={{marginRight:7}}/>Enviar Listado de Compra</h3>
          <button className="btn btn-gris btn-icon btn-sm" onClick={onClose}><i className="fas fa-times"/></button>
        </div>

        <div className="modal-body">
          <div className="form-group">
            <label className="form-label">
              Destinatarios
              <span style={{marginLeft:8,fontWeight:400,color:'var(--gris)',fontSize:11}}>
                ({destinatarios.length} {destinatarios.length===1?'destinatario':'destinatarios'})
              </span>
            </label>

            <div style={{marginBottom:8}}>
              {destinatarios.length===0 && (
                <div style={{padding:'10px',background:'#fef3c7',borderRadius:6,fontSize:13,color:'#92400e',border:'1px solid #fcd34d'}}>
                  <i className="fas fa-exclamation-triangle" style={{marginRight:6}}/>
                  No hay destinatarios. Agrega al menos uno antes de enviar.
                </div>
              )}
              {destinatarios.map((c,i)=>(
                <div key={i} style={{
                  display:'flex', alignItems:'center', justifyContent:'space-between',
                  padding:'7px 10px', background:'#f0fdf4', borderRadius:6,
                  marginBottom:5, border:'1px solid #bbf7d0', gap:8
                }}>
                  <div style={{display:'flex',alignItems:'center',gap:7,minWidth:0}}>
                    <i className="fas fa-envelope" style={{color:'var(--verde)',fontSize:12,flexShrink:0}}/>
                    <span style={{fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c}</span>
                  </div>
                  <button
                    className="btn btn-sm btn-icon"
                    style={{background:'transparent',color:'#dc2626',flexShrink:0,padding:'3px 6px'}}
                    onClick={()=>quitarCorreo(i)}
                    title="Quitar destinatario"
                  >
                    <i className="fas fa-times"/>
                  </button>
                </div>
              ))}
            </div>

            <div style={{display:'flex',gap:7}}>
              <div style={{flex:1,position:'relative'}}>
                <input
                  className={`form-control ${errorCorreo?'error':''}`}
                  type="email"
                  placeholder="nuevo@correo.com"
                  value={nuevoCorreo}
                  onChange={e=>{setNuevoCorreo(e.target.value);setErrorCorreo('');}}
                  onKeyDown={handleKeyDown}
                />
              </div>
              <button className="btn btn-verde" onClick={agregarCorreo} style={{flexShrink:0}}>
                <i className="fas fa-plus"/>Agregar
              </button>
            </div>
            {errorCorreo && (
              <div style={{marginTop:4,fontSize:12,color:'var(--rojo)'}}>
                <i className="fas fa-exclamation-circle" style={{marginRight:4}}/>{errorCorreo}
              </div>
            )}
          </div>

          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">
              Contenido del correo
              <span style={{marginLeft:8,fontWeight:400,color:'var(--gris)',fontSize:11}}>({listado.items.length} productos)</span>
            </label>
            <div style={{
              maxHeight:160, overflowY:'auto',
              background:'#f8fafc', borderRadius:6,
              padding:'10px 12px', fontSize:12,
              border:'1px solid var(--borde)',
              fontFamily:'monospace', lineHeight:1.6
            }}>
              <div style={{fontWeight:700,marginBottom:4}}>LISTADO DE COMPRA — {titulo}</div>
              {listado.items.map((p,i)=>(
                <div key={i} style={{display:'flex',gap:10,justifyContent:'space-between',padding:'2px 0',borderBottom:'1px solid #e5e7eb'}}>
                  <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.nombre}</span>
                  <span style={{color:'var(--gris)',flexShrink:0}}>{p.suplidor||'—'}</span>
                  <span style={{fontWeight:700,color:'var(--azul)',flexShrink:0}}>
                    {Number(p.comprar.toFixed(2))} {p.medida}
                  </span>
                </div>
              ))}
            </div>
          </div>
        </div>

        <div className="modal-footer" style={{justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
          <p style={{fontSize:11,color:googleConfigured?'#15803d':'#b45309',margin:0}}>
            <i className={`fas ${googleConfigured?'fa-check-circle':'fa-exclamation-triangle'}`} style={{marginRight:4}}/>
            {googleConfigured
              ? (googleAuthed ? 'Gmail listo para enviar en esta sesion.' : 'Google configurado. El permiso se pedira al enviar.')
              : 'Sin configuracion de Google. Activa Config. Google antes de enviar.'}
          </p>
          <div style={{display:'flex',gap:8}}>
            {googleConfigured && !googleAuthed && (
              <button
                className="btn btn-gris"
                onClick={async ()=>{
                  try {
                    await solicitarPermisosGoogle(true);
                    toast('Permisos de Google actualizados.','ok');
                  } catch (err) {
                    toast(err && err.message ? err.message : 'No se pudo solicitar permisos.','error');
                  }
                }}
                disabled={enviando || authorizing}
                style={{opacity:(enviando || authorizing)?0.7:1}}
              >
                {authorizing
                  ? <><i className="fas fa-spinner fa-spin"/>Autorizando...</>
                  : <><i className="fas fa-key"/>Permitir Google</>}
              </button>
            )}
            <button className="btn btn-gris" onClick={onClose} disabled={enviando}>Cancelar</button>
            <button
              className="btn btn-azul"
              onClick={enviar}
              disabled={destinatarios.length===0 || enviando || authorizing}
              style={{opacity:(destinatarios.length===0||enviando||authorizing)?0.7:1}}
            >
              {enviando
                ? <><i className="fas fa-spinner fa-spin"/>Enviando...</>
                : <><i className="fas fa-paper-plane"/>Enviar correo</>}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function Registros({regEntradas, regSalidas, regDecomiso}) {
  const [tab, setTab] = useState('entradas');
  const [busqueda, setBusqueda] = useState('');
  const data  = {entradas:regEntradas, salidas:regSalidas, decomiso:regDecomiso}[tab];
  const color = {entradas:'verde', salidas:'azul', decomiso:'rojo'}[tab];
  const filtrado = busqueda ? data.filter(r=>normalizar(r.producto).includes(normalizar(busqueda))) : data;

  return (
    <div>
      <div className="tabs">
        <div className={`tab ${tab==='entradas'?'active':''}`} onClick={()=>setTab('entradas')}>Entradas ({regEntradas.length})</div>
        <div className={`tab ${tab==='salidas'?'active':''}`}  onClick={()=>setTab('salidas')}>Salidas ({regSalidas.length})</div>
        <div className={`tab ${tab==='decomiso'?'active':''}`} onClick={()=>setTab('decomiso')}>Decomiso ({regDecomiso.length})</div>
      </div>
      <div style={{marginBottom:12}}>
        <div className="search-wrap" style={{maxWidth:300}}>
          <i className="fas fa-search search-icon"/>
          <input className="form-control" placeholder="Buscar producto..." value={busqueda} onChange={e=>setBusqueda(e.target.value)}/>
        </div>
      </div>
      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr><th>Fecha</th><th>Producto</th><th>Medida</th><th>Cantidad</th></tr></thead>
            <tbody>
              {[...filtrado].reverse().map((r,i)=>(
                <tr key={i}>
                  <td style={{fontSize:11,color:'var(--gris)',whiteSpace:'nowrap'}}>{formatDatetime(r.fecha)}</td>
                  <td style={{fontWeight:500}}>{r.producto}</td>
                  <td><span className="pill pill-gris">{r.medida}</span></td>
                  <td style={{fontWeight:600,color:`var(--${color})`}}>{r.cantidad}</td>
                </tr>
              ))}
              {filtrado.length===0 && <tr><td colSpan="4" style={{textAlign:'center',padding:'28px',color:'var(--gris)'}}>Sin registros</td></tr>}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════
   HISTORIAL DECOMISO COCINA
════════════════════ */
function HistorialDecomisoCocina({data}) {
  const [busqueda, setBusqueda] = useState('');
  const filtrado = busqueda ? data.filter(r=>normalizar(r.producto).includes(normalizar(busqueda))||normalizar(r.responsable).includes(normalizar(busqueda))) : data;

  return (
    <div>
      <div style={{marginBottom:12}}>
        <div className="search-wrap" style={{maxWidth:300}}>
          <i className="fas fa-search search-icon"/>
          <input className="form-control" placeholder="Buscar producto o responsable..." value={busqueda} onChange={e=>setBusqueda(e.target.value)}/>
        </div>
      </div>
      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr><th>Producto</th><th>Fecha</th><th>Cantidad</th><th>Motivo</th><th>Área</th><th>Responsable</th></tr></thead>
            <tbody>
              {[...filtrado].reverse().map((h,i)=>(
                <tr key={i}>
                  <td style={{fontWeight:500}}>{h.producto}</td>
                  <td style={{fontSize:11}}>{h.fecha}</td>
                  <td style={{fontWeight:600,color:'var(--rojo)'}}>{h.cantidad}</td>
                  <td style={{maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{h.motivo}</td>
                  <td><span className={`pill ${h.area==='COCINA'?'pill-rojo':h.area==='SALON'?'pill-azul':h.area==='ALMACEN'?'pill-naranja':'pill-gris'}`}>{h.area}</span></td>
                  <td>{h.responsable}</td>
                </tr>
              ))}
              {filtrado.length===0 && <tr><td colSpan="6" style={{textAlign:'center',padding:'28px',color:'var(--gris)'}}>Sin registros</td></tr>}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ── Mount ── */
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
